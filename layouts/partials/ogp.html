{{ if .IsPage }}

{{ $svg := resources.Get "ogp/single.svg" }}
{{ $svg = $svg | resources.ExecuteAsTemplate (printf "ogp/%s.svg" .File.BaseFileName) . }}

<meta property="og:title" content="{{ .Title }}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{ .Permalink }}">

<meta property="og:image" content="{{ $svg.Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ $svg.Permalink }}">

{{ end }}
